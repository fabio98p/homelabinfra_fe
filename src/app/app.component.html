<div class="container">
  <h1>TodoList</h1>

  <div class="form">
    <input
      type="text"
      [(ngModel)]="draft.title"
      placeholder="What needs to be done?"
      (keyup.enter)="add()"
    />
    <input
      type="text"
      [(ngModel)]="draft.description"
      placeholder="Description (optional)"
      (keyup.enter)="add()"
    />
    <button (click)="add()" [disabled]="!draft.title.trim()">Add</button>
  </div>

  @if (error) {
    <p class="error">{{ error }}</p>
  }

  @if (loading) {
    <p class="hint">Loading&#8230;</p>
  }

  @if (todos.length > 0) {
    <ul>
      @for (todo of todos; track todo.id) {
        <li [class.done]="todo.completed">
          <label>
            <input type="checkbox" [checked]="todo.completed" (change)="toggle(todo)" />
            <span class="title">{{ todo.title }}</span>
            @if (todo.description) {
              <span class="desc">{{ todo.description }}</span>
            }
          </label>
          <button class="del" (click)="delete(todo.id)">&#x2715;</button>
        </li>
      }
    </ul>
  }

  @if (!loading && todos.length === 0 && !error) {
    <p class="hint">No todos yet. Add one above!</p>
  }
</div>
